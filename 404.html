<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — Hotragn Pettugani</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Inter:wght@400..700&display=swap" rel="stylesheet">
  <script>
    // GitHub Pages serves this page for any missing path. On a project site
    // the first path segment is the repo name; resolve the base from it so
    // the stylesheet and home link work at /<repo>/ and at the domain root.
    (function () {
      var repo = "Hotragn-UI-UX-Design-Portfolio.io";
      var seg = location.pathname.split("/")[1] || "";
      var base = seg === repo ? "/" + repo + "/" : "/";
      var link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = base + "css/style.css";
      document.head.appendChild(link);
      document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("home-link").href = base;
      });
    })();
  </script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='42' fill='%23c74a22'/></svg>">
</head>
<body>
  <main style="min-height:70vh;display:grid;place-items:center;text-align:center;padding:2rem">
    <div>
      <p class="kicker" style="justify-content:center">404</p>
      <h1 style="font-size:clamp(2rem,5vw,3.4rem);max-width:20ch">This page wandered off the sitemap.</h1>
      <p style="color:var(--muted);max-width:44ch;margin-inline:auto">Broken paths are a personal enemy of mine, so this one stings. The good stuff is all still here.</p>
      <a class="btn btn-primary" id="home-link" href="/" style="margin-top:1rem">Back to the portfolio</a>
    </div>
  </main>
</body>
</html>
