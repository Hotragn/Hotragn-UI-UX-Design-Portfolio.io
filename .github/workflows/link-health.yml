name: Weekly external link health

# Dead artifact links are how portfolios quietly die. This builds the
# site, then checks every external link in the exported HTML (Figma,
# Drive, Medium, deployed apps) once a week and opens a GitHub issue
# when something breaks.

on:
  schedule:
    - cron: "0 13 * * 1" # Mondays 13:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  external-links:
    name: Check external links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build static export
        run: npm run build
      - name: Run lychee against external links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-retries 3
            --timeout 30
            --accept "200..=299,403,429"
            --exclude "mailto:.*"
            --fallback-extensions html
            "./out/**/*.html"
          fail: false
          output: lychee-report.md
      - name: Open an issue if links are broken
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Broken links detected on the portfolio"
          content-filepath: lychee-report.md
          labels: link-health
