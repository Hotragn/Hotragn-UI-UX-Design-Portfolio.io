name: Quality gates & production check

# Vercel deploys this repo automatically on push. These gates run in
# parallel with that deploy; if any gate fails, the commit is marked
# failing so the regression is caught even though Vercel already shipped
# it — fix forward or revert. The final job verifies production serves
# the new commit successfully.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-html:
    name: HTML validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate all HTML files
        run: npx --yes html-validate@8 "index.html" "404.html" "work/*.html"

  check-links:
    name: Internal link integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check internal links and assets (offline)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --no-progress
            --root-dir ${{ github.workspace }}
            --exclude-path 404.html
            "./**/*.html"
          fail: true

  accessibility:
    name: Accessibility audit (WCAG 2.1 AA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Serve site and run pa11y-ci
        run: |
          npx --yes http-server@14 . -p 8080 --silent &
          sleep 2
          npx --yes pa11y-ci@3 --config .pa11yci.json

  verify-production:
    name: Production smoke test (Vercel)
    if: github.event_name != 'pull_request'
    needs: [validate-html, check-links, accessibility]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel to serve the site, then check every page
        run: |
          base="https://hotragnpettugani-design.vercel.app/"
          sleep 45
          fail=0
          for path in "" "work/paypal.html" "work/rare-rabbit.html" "work/notion.html" "work/family-foundations.html"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${base}${path}")
            echo "$code  ${base}${path}"
            if [ "$code" != "200" ]; then fail=1; fi
          done
          if [ "$fail" != "0" ]; then
            echo "::error::One or more production pages are not serving 200"
            exit 1
          fi
